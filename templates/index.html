<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <title>SaveLinkX | Download X (Twitter) Videos Online for Free</title>
  <meta name="description" content="Download videos from X (Twitter) instantly and for free. Paste any tweet link and save it as MP4." />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 64px; }
    
    /* Topnav Original */
    .topnav { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; padding: 20px 0 40px; }
    .topnav-brand { font-size: 1.2rem; font-weight: 800; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .topnav-brand svg { width: 24px; fill: #1d9bf0; }
    .topnav-links { display: flex; gap: 20px; list-style: none; }
    .topnav-links a { color: #888; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
    .topnav-links a:hover { color: #1d9bf0; }

    header { text-align: center; margin-bottom: 36px; }
    header h1 { font-size: 2.2rem; font-weight: 800; color: #fff; letter-spacing: -1px; }
    header h1 span { color: #1d9bf0; }
    header p { color: #888; margin-top: 10px; font-size: 1rem; }

    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 24px; padding: 40px; width: 100%; max-width: 700px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .input-row { display: flex; gap: 12px; }
    .input-wrap { position: relative; flex: 1; }
    input[type="text"] { width: 100%; background: #0f0f0f; border: 2px solid #333; border-radius: 14px; padding: 15px 18px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #1d9bf0; }

    #fetchBtn { background: #1d9bf0; color: #fff; padding: 15px 28px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; transition: background 0.2s; }
    #fetchBtn:hover { background: #1a8cd8; }

    #status { margin-top: 20px; text-align: center; min-height: 24px; font-size: 0.9rem; }
    .status-error { color: #ff6b6b; }
    .status-loading { color: #aaa; }

    #videoInfo { display: none; margin-top: 32px; border-top: 1px solid #2a2a2a; padding-top: 24px; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    
    .thumb-row { display: flex; gap: 20px; align-items: center; }
    #thumbnail { width: 150px; border-radius: 12px; border: 1px solid #333; }
    .meta h2 { font-size: 1.1rem; font-weight: 600; color: #fff; }

    .format-section { margin-top: 24px; }
    .format-section label { font-size: 0.8rem; color: #666; text-transform: uppercase; font-weight: 700; }
    select { width: 100%; background: #0f0f0f; border: 2px solid #333; padding: 14px; color: #fff; border-radius: 14px; margin-top: 10px; cursor: pointer; }

    #downloadBtn { width: 100%; background: #1d9bf0; color: #fff; padding: 18px; border-radius: 14px; font-weight: 700; margin-top: 20px; border: none; cursor: pointer; font-size: 1.1rem; }

    /* Steps */
    .how-to { margin-top: 48px; width: 100%; max-width: 700px; }
    .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
    .step { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 24px; text-align: center; transition: transform 0.2s; }
    .step:hover { transform: translateY(-5px); }
    .step-num { background: #1d9bf0; width: 32px; height: 32px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; }
    .step p { font-size: 0.9rem; color: #888; font-weight: 500; }

    footer { margin-top: 60px; padding: 40px 0; border-top: 1px solid #1a1a1a; width: 100%; max-width: 700px; text-align: center; color: #444; }
    footer a { color: #666; text-decoration: none; margin: 0 10px; font-size: 0.85rem; }
    footer a:hover { color: #1d9bf0; text-decoration: underline; }

    @media (max-width: 600px) {
      .steps { grid-template-columns: 1fr; }
      .input-row { flex-direction: column; }
      header h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="/" class="topnav-brand">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L2.007 2.25h6.394l4.266 5.637 5.577-5.637Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      SaveLinkX
    </a>
    <ul class="topnav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/faq">FAQ</a></li>
      <li><a href="/contato">Contact</a></li>
    </ul>
  </nav>

  <header>
    <h1><span>X Video Downloader</span> - Fast & Free</h1>
    <p>Paste any X (Twitter) link and download videos instantly in MP4.</p>
  </header>

  <main class="card">
    <div class="input-row">
      <div class="input-wrap">
        <input type="text" id="urlInput" placeholder="Paste tweet link here..." />
      </div>
      <button id="fetchBtn" onclick="fetchInfo()">Download</button>
    </div>
    <div id="status"><span id="statusText"></span></div>

    <div id="videoInfo">
      <div class="thumb-row">
        <img id="thumbnail" src="" alt="Thumbnail" />
        <div class="meta">
          <h2 id="title">Video Title</h2>
        </div>
      </div>
      <div class="format-section">
        <label>Select Quality</label>
        <select id="formatSelect">
            <option value="best">Best Quality (MP4)</option>
        </select>
      </div>
      <button id="downloadBtn" onclick="startDownload()">Download Now</button>
    </div>
  </main>

  <section class="how-to">
    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <p>Copy tweet URL</p>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <p>Paste link above</p>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <p>Save video file</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2026 SaveLinkX - All Rights Reserved</p>
    <div style="margin-top: 15px;">
        <a href="/termos">Terms</a>
        <a href="/privacidade">Privacy</a>
        <a href="/contato">Contact</a>
    </div>
  </footer>

  <script>
    let currentUrl = "";

    async function fetchInfo() {
      const url = document.getElementById("urlInput").value.trim();
      if(!url) return;
      currentUrl = url;
      const statusText = document.getElementById("statusText");
      statusText.textContent = "Fetching video info...";
      statusText.className = "status-loading";
      
      try {
        const res = await fetch("/info", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        if(!res.ok) throw new Error();

        document.getElementById("thumbnail").src = data.thumbnail;
        document.getElementById("title").textContent = data.title;
        document.getElementById("videoInfo").style.display = "block";
        statusText.textContent = "";
      } catch (err) {
        statusText.textContent = "Error: Make sure the link is valid and public.";
        statusText.className = "status-error";
      }
    }

    async function startDownload() {
      const btn = document.getElementById("downloadBtn");
      const originalText = btn.textContent;
      btn.textContent = "Processing...";
      btn.disabled = true;

      try {
        const res = await fetch("/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: currentUrl, format_id: "best" }),
        });
        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "savelinkx_video.mp4";
        a.click();
      } catch (err) {
        alert("Download failed. Please try again.");
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
      }
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") fetchInfo();
    });
  </script>

  <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="savelinkx" data-description="Support me on Buy me a coffee!" data-message="Se o SaveLinkX te ajudou, considere me pagar um café! ☕" data-color="#1DA1F2" data-position="Right" data-x_margin="18" data-y_margin="18"></script>

</body>
</html>
