  <main class="card">
    <div class="input-row">
      <div class="input-wrap">

        <label>Quality</label>
        <select id="formatSelect"></select>
      </div>

      </button>
    </div>

  <section class="how-to">

  <script>
    let currentUrl = "";

    function setStatus(msg, type = "") {
      document.getElementById("statusText").textContent = msg;
      document.getElementById("status").className = type ? `status-${type}` : "";
      document.getElementById("statusSpinner").style.display = type === "loading" ? "block" : "none";
    }

    async function pasteUrl() {
      const text = await navigator.clipboard.readText();
      document.getElementById("urlInput").value = text;
    }

    async function fetchInfo() {
      const url = document.getElementById("urlInput").value.trim();
      if (!url) return;
      currentUrl = url;
      document.getElementById("fetchSpinner").style.display = "block";
      try {
        const res = await fetch("/info", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });
        const data = await res.json();
        document.getElementById("thumbnail").src = data.thumbnail;
        document.getElementById("title").textContent = data.title;
        document.getElementById("uploaderBadge").textContent = data.uploader;
        document.getElementById("durationBadge").textContent = data.duration;
        
        const sel = document.getElementById("formatSelect");
        sel.innerHTML = '<option value="best">Best Quality</option><option value="worst">Low Quality</option>';
        
        document.getElementById("videoInfo").style.display = "block";
        setStatus("");
      } catch (err) {
        setStatus("Error loading video", "error");
      } finally {
        document.getElementById("fetchSpinner").style.display = "none";
      }
    }

    async function startDownload() {
      const btn = document.getElementById("downloadBtn");
      btn.disabled = true;
      document.getElementById("dlSpinner").style.display = "block";
      try {
        const res = await fetch("/download", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: currentUrl, format_id: document.getElementById("formatSelect").value }),
        });
        const blob = await res.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "video.mp4";
        a.click();
        setStatus("Download started!", "ok");
      } catch (err) {
        setStatus("Download failed", "error");
      } finally {
        btn.disabled = false;
        document.getElementById("dlSpinner").style.display = "none";
      }
    }

    document.getElementById("urlInput").addEventListener("keydown", e => {
      if (e.key === "Enter") fetchInfo();
    });
  </script>
